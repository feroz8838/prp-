<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> 
<title>Ek pyaar kahani</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff4d6d,#c9184a,#7209b7);
color:white;
text-align:center;
font-family: 'Poppins',sans-serif;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:32px;
border-radius:18px;
box-shadow:0 15px 45px rgba(0,0,0,0.35);
animation:fade 0.7s ease;
}

h1,h2{
margin-bottom:14px;
}

p{
line-height:1.7;
font-size:19px;
opacity:0.95;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.25s;
font-family: 'Poppins',sans-serif;
}

.next{
background:#ffffff;
color:#333;
}

.next:hover{
transform:scale(1.04);
}

.yes{
background:#ff4d6d;
color:white;
}

.time{
background:rgba(203, 17, 203, 0.955);
color:white;
}

button:hover{
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<div class="card" id="app"></div>

<script>

const app=document.getElementById("app")

function screen(html){
app.innerHTML=html
}

/* SCREEN 1 */

screen(`
<h1>Yeh thoda awkward hai...</h1>

<p>
Sach bolun to mujhe khud samajh nahi aaya<br>
yeh kab start hua.
</p>

<button class="next" onclick="s2()">Continue</button>
`)

/* SCREEN 2 */

function s2(){
screen(`
<p>
Pehle to bas normal baatein hoti thi.<br>
Random jokes... random conversations...
</p>

<p>
Lekin phir pata nahi kab
tum thodi zyada important ho gaye.
</p>

<button class="next" onclick="s3()">Continue</button>
`)
}

/* SCREEN 3 */

function s3(){
screen(`
<p>
Aur ab situation yeh hai ke<br>
agar tum message na karo<br>
to phone thoda zyada hi boring lagta hai.
</p>

<button class="next" onclick="s4()">Continue</button>
`)
}

/* SCREEN 4 */

function s4(){
screen(`
<p>
To maine socha seedha pooch leta hoon.<br>
Drama kam, honesty zyada.
</p>

<button class="next" onclick="question()">Continue</button>
`)
}

/* FINAL QUESTION */

function question(){
screen(`
<h2>Sach sach batao…</h2>

<p>
Kya tumhein bhi thoda sa feel aata hai? ,Meri Jaaan🤍
</p>

<button class="yes" onclick="answer('YES')">
Haan yaar ❤️
</button>

<button class="time" onclick="answer('TIME')">
Thoda time chahiye
</button>
`)
}

/* ANSWER FUNCTION (UNCHANGED) */

function answer(choice){

if(choice==="YES"){
window.location.href='https://feroz8838.github.io/prp-/log.html?action=YES'
}

else{
window.location.href='https://feroz8838.github.io/prp-/log.html?action=NEEDTIME'
}

}

</script>

</body>
</html>
