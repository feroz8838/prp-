<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing</title>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ff4d6d,#c9184a,#7209b7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  color:white;
  width:92%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:28px;
  text-align:center;
  box-shadow:0 15px 45px rgba(0,0,0,0.35);
  animation:fade 0.8s ease;
}

.spinner{
  width:36px;
  height:36px;
  border:4px solid #eee;
  border-top:4px solid #333;
  border-radius:50%;
  margin:18px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}
  
h2{
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">
  <h2 id="title">Just a moment...</h2>
  <p id="message">Saving your answer 💫</p>
  <div class="spinner" id="spinner"></div>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const action = new URLSearchParams(window.location.search).get("action") || "UNKNOWN";

const title = document.getElementById("title");
const message = document.getElementById("message");
const spinner = document.getElementById("spinner");

// Send data to Apps Script
fetch("https://script.google.com/macros/s/AKfycbyOmyYtVahOrI8Ktblr7ZWJLo-DFIYgc5352VJpPeRzuaoo9mcGOWB9mJHsVB2vsaQ/exec",{
  method:"POST",
  mode:"no-cors",
  headers:{
    "Content-Type":"text/plain"
  },
  body:JSON.stringify({
    action:action,
    name:"MUQ",
    userAgent:navigator.userAgent
  })
});

// Show result after short delay
setTimeout(()=>{

  spinner.style.display="none";

  if(action==="YES"){
    title.innerText="That means more than you know 🤍";
    message.innerText="📞 Call the number — your hubby is waiting.";
  }

  else if(action==="NEEDTIME"){
    title.innerText = "Take your time!";
    message.innerText = "Think about it and decide later 💭";
  }

  else{
    title.innerText="All set!";
    message.innerText="Your response has been recorded.";
  }

},2000);

});

</script>

</body>
</html>
