<!DOCTYPE html>

<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing...</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;

  background: linear-gradient(270deg,#1e1e2f,#3a0ca3,#7209b7,#4361ee);
  background-size:800% 800%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  width:90%;
  max-width:420px;
  padding:35px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);

  border-radius:22px;
  box-shadow:
  0 10px 40px rgba(0,0,0,0.3),
  inset 0 0 25px rgba(255,255,255,0.05);

  text-align:center;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(25px)}
  to{opacity:1;transform:translateY(0)}
}

h2{
  margin:0 0 10px 0;
  font-weight:600;
  letter-spacing:0.5px;
}

p{
  margin:0;
  opacity:0.8;
  font-size:14px;
}

.spinner{
  width:46px;
  height:46px;
  margin:25px auto;

  border:4px solid rgba(255,255,255,0.25);
  border-top:4px solid white;

  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.progress{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4cc9f0,#b5179e);
  animation:load 4s ease forwards;
}

@keyframes load{
  from{width:0%}
  to{width:100%}
}

.footer{
  margin-top:18px;
  font-size:12px;
  opacity:0.5;
}
</style>

</head>

<body>

<div class="container">

  <h2 id="title">Just a moment...</h2>
  <p id="message">Finalizing something special 💫</p>

  <div class="spinner"></div>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="footer">
    Processing request...
  </div>

</div>

<script>

const action = new URLSearchParams(window.location.search).get("action") || "UNKNOWN";

fetch("https://script.google.com/macros/s/AKfycbyyPSejVsjmPkElLbtt4fPFL3TtWIaqqE7cU0R94VUjmmyi6yR02QhgW6BXu1p4J7BK/exec",{
  method:"POST",
  mode:"no-cors",
  headers:{
    "Content-Type":"text/plain"
  },
  body:JSON.stringify({
    action:action,
    userAgent:navigator.userAgent
  })
});

setTimeout(()=>{
  document.getElementById("title").innerText="All set!";
  document.getElementById("message").innerText="Everything has been completed successfully ❤️";
  document.querySelector(".spinner").style.display="none";
},4000);

</script>

</body>
</html>
