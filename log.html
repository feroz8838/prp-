<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#ff4d6d,#c9184a,#7209b7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  color:white;
  width:92%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:28px;
  text-align:center;
  box-shadow:0 15px 45px rgba(0,0,0,0.35);
  animation:fade 0.8s ease;
}

.spinner{
  width:36px;
  height:36px;
  border:4px solid #eee;
  border-top:4px solid #333;
  border-radius:50%;
  margin:18px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}
.container a{
text-decoration:none;
color:white;
}
h2{
  margin-bottom:10px;
}
</style>

</head>

<body>

<div class="container">
  <h2 id="title">Just a moment...</h2>
  <p id="message">Analysing your answer 💫</p>
  <div class="spinner" id="spinner"></div>
  <p id="msg1"></p>
  <a id="anchor" href="tel:+918838858540"></a>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

const action = new URLSearchParams(window.location.search).get("action") || "NO-ANS";
//const acname = new URLSearchParams(window.location.search).get("name") || "ANONYMOUS";
const title = document.getElementById("title");
const message = document.getElementById("message");
const spinner = document.getElementById("spinner");
const anchor = document.getElementById("anchor");
const msg= document.getElementById("msg1");

// Send data to Apps Script
fetch("https://script.google.com/macros/s/AKfycbyOmyYtVahOrI8Ktblr7ZWJLo-DFIYgc5352VJpPeRzuaoo9mcGOWB9mJHsVB2vsaQ/exec",{
  method:"POST",
  mode:"no-cors",
  headers:{
    "Content-Type":"text/plain"
  },
  body:JSON.stringify({
    action:action,
  //  name:acname,
    userAgent:navigator.userAgent
  })
});

// Show result after short delay
setTimeout(()=>{

  spinner.style.display="none";

  if(action==="YES"){
    title.innerText="That means more than you know 🤍";
    message.innerText=" Call the number — your hubby is waiting.";
    msg.innerText="Click Below 👇";
    anchor.innerText="📱:+91 88388 585XX";
  }

  else if(action==="NEEDTIME"){
    title.innerText = "Take your time!";
    message.innerText = "Meri Jaan, jitna time chahiye le lo… main yahin hoon.";
  }

  else{
    title.innerText="All set!";
  }

},2000);

});

</script>

</body>
</html>
