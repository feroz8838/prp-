<script>

const action = new URLSearchParams(window.location.search).get("action") || "UNKNOWN";

const title = document.querySelector("h2");
const message = document.querySelector("p");

// Send data to Google Apps Script
fetch("https://script.google.com/macros/s/AKfycbyyPSejVsjmPkElLbtt4fPFL3TtWIaqqE7cU0R94VUjmmyi6yR02QhgW6BXu1p4J7BK/exec", {
  method: "POST",
  mode: "no-cors",
  headers: {
    "Content-Type": "text/plain"
  },
  body: JSON.stringify({
    action: action,
    userAgent: navigator.userAgent
  })
});

// Change message based on action
setTimeout(() => {

  if(action === "YES"){
    title.innerText = "Great choice!";
    message.innerText = "📞 Call the number — your hubby is waiting ❤️";
  }

  else if(action === "NO"){
    title.innerText = "No worries!";
    message.innerText = "Maybe next time 😊";
  }

  else if(action === "MAYBE"){
    title.innerText = "Take your time!";
    message.innerText = "Think about it and decide later 💭";
  }

  else{
    title.innerText = "All set!";
    message.innerText = "You can close this page now.";
  }

}, 2000);

</script>
